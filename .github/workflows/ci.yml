name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Linux: runs on all events (cheapest runner)
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - run: npx vitest run
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/dist

  # macOS + Windows: only on pushes to main (expensive runners)
  macos:
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - run: npx vitest run

  windows:
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - run: npx vitest run
