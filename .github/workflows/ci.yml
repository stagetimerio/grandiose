name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            main_only: false
          - os: macos-latest
            main_only: true
          - os: windows-latest
            main_only: true
    runs-on: ${{ matrix.os }}
    if: ${{ !matrix.main_only || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - run: npx vitest run
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/dist
